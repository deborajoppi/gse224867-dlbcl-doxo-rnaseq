name: ci

on:
  push:
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          # Match the Bioconductor version pinned in renv.lock (Bioc 3.20 -> R 4.4.x)
          r-version: '4.4.1'
          use-public-rspm: false

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install renv + BiocManager
        run: |
          R -q -e 'install.packages(c("renv","BiocManager"), repos="https://cloud.r-project.org")'

      - name: Restore renv (Bioconductor repos)
        run: |
          R -q -e 'options(repos = BiocManager::repositories(version="3.20")); renv::restore(prompt=FALSE)'

      - name: Install annotation packages (Ensembl->HUGO)
        run: |
          R -q -e 'options(repos = BiocManager::repositories(version="3.20")); BiocManager::install(c("AnnotationDbi","org.Hs.eg.db"), ask=FALSE, update=FALSE)'

      - name: Run pipeline
        shell: bash
        run: |
          set -euxo pipefail
          make download
          make metadata
          make de
          make report
