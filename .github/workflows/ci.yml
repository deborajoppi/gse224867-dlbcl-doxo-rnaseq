name: ci

on:
  push:
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'
          use-public-rspm: false

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libpng-dev

      - name: Install renv + BiocManager
        run: |
          R -q -e 'install.packages(c("renv","BiocManager"), repos="https://cloud.r-project.org")'

      - name: Restore renv with Bioconductor repos
        run: |
          R -q -e 'options(repos = BiocManager::repositories(version="3.20")); renv::restore(prompt=FALSE)'

      - name: Run pipeline
        shell: bash
        run: |
          set -euxo pipefail
          make download
          make metadata
          make de
          make report
