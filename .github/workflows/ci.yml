name: ci

on:
  push:
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          # IMPORTANT: Bioconductor + renv is more reliable without forcing RSPM
          use-public-rspm: false

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install renv + BiocManager
        run: |
          R -q -e 'install.packages(c("renv","BiocManager"), repos="https://cloud.r-project.org")'

      - name: Restore renv (with Bioconductor repos)
        run: |
          R -q -e 'options(repos = BiocManager::repositories()); renv::restore(prompt=FALSE)'

      - name: Install annotation packages (for Ensembl->HUGO)
        run: |
          R -q -e 'if(!requireNamespace("BiocManager", quietly=TRUE)) install.packages("BiocManager", repos="https://cloud.r-project.org"); BiocManager::install(c("AnnotationDbi","org.Hs.eg.db"), ask=FALSE, update=FALSE)'
          
      - name: Run pipeline
        shell: bash
        run: |
          set -euxo pipefail
          make download
          make metadata
          make de
          make report
